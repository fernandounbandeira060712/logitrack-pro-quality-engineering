name: DEV Quality Gate

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: dev-quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gate:
    name: DEV Suite - Playwright, JUnit and Allure
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      LOGITRACK_EMAIL: ${{ secrets.LOGITRACK_EMAIL }}
      LOGITRACK_PASSWORD: ${{ secrets.LOGITRACK_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Validate required secrets
        shell: bash
        run: |
          if [ -z "$LOGITRACK_EMAIL" ] || [ -z "$LOGITRACK_PASSWORD" ]; then
            echo "::error::Configure LOGITRACK_EMAIL and LOGITRACK_PASSWORD in repository secrets."
            exit 1
          fi

      - name: Install Playwright Chromium
        run: >
          mvn -B -ntp exec:java
          -Dexec.mainClass=com.microsoft.playwright.CLI
          -Dexec.args="install --with-deps chromium"

      - name: Run DEV quality gate suite
        run: >
          mvn -B -ntp clean test
          -Dtest=DevQualityGateSuite
          -Demail="$LOGITRACK_EMAIL"
          -Dpassword="$LOGITRACK_PASSWORD"
          -Dheadless=true
          -Dtimeout=45000
          -DopenAllure=false
          -Dtest.retry.count=1

      - name: Generate Allure report
        if: always()
        run: mvn -B -ntp allure:report

      - name: Upload Allure HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-allure-html-${{ github.run_number }}
          path: target/site/allure-maven
          if-no-files-found: warn
          retention-days: 15

      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-playwright-evidence-${{ github.run_number }}
          path: |
            target/allure-results
            target/screenshots
            target/videos
            target/traces
            target/logs
            target/surefire-reports
          if-no-files-found: warn
          retention-days: 15