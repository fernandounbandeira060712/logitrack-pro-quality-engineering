name: Main Regression and Allure Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: main-regression-allure-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  quality-reports:
    name: Regression and Known Defects Reports
    runs-on: ubuntu-latest
    timeout-minutes: 70

    env:
      LOGITRACK_EMAIL: ${{ secrets.LOGITRACK_EMAIL }}
      LOGITRACK_PASSWORD: ${{ secrets.LOGITRACK_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Validate required secrets
        shell: bash
        run: |
          if [ -z "$LOGITRACK_EMAIL" ] || [ -z "$LOGITRACK_PASSWORD" ]; then
            echo "::error::Configure LOGITRACK_EMAIL and LOGITRACK_PASSWORD in repository secrets."
            exit 1
          fi

      - name: Install Playwright Chromium
        run: >
          mvn -B -ntp exec:java
          -Dexec.mainClass=com.microsoft.playwright.CLI
          -Dexec.args="install --with-deps chromium"

      - name: Run main regression suite
        run: >
          mvn -B -ntp clean test
          -Dtest=FullRegressionSuite
          -Demail="$LOGITRACK_EMAIL"
          -Dpassword="$LOGITRACK_PASSWORD"
          -Dheadless=true
          -Dtimeout=60000
          -DopenAllure=false
          -Dtest.retry.count=1
          -Djunit.jupiter.execution.parallel.enabled=false
          -Djunit.jupiter.execution.parallel.mode.default=same_thread
          -Djunit.jupiter.execution.parallel.mode.classes.default=same_thread

      - name: Generate main Allure report
        if: always()
        run: mvn -B -ntp allure:report

      - name: Create main report fallback
        if: always()
        shell: bash
        run: |
          REPORT_DIR="target/site/allure-maven-plugin"

          if [ ! -f "$REPORT_DIR/index.html" ]; then
            mkdir -p "$REPORT_DIR"

            cat > "$REPORT_DIR/index.html" <<'HTML'
          <!doctype html>
          <html lang="pt-BR">
          <head>
            <meta charset="utf-8">
            <title>LogiTrack Pro - Relatorio principal indisponivel</title>
          </head>
          <body>
            <h1>Relatorio Allure principal indisponivel</h1>
            <p>Consulte a execucao do GitHub Actions e os artefatos do workflow.</p>
          </body>
          </html>
          HTML
          fi

      - name: Prepare public main report
        if: always()
        shell: bash
        run: |
          rm -rf public-site
          mkdir -p public-site

          cp -R target/site/allure-maven-plugin/. public-site/
          touch public-site/.nojekyll

      - name: Upload main Allure HTML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-allure-html-${{ github.run_number }}
          path: target/site/allure-maven-plugin
          if-no-files-found: error
          retention-days: 30

      - name: Upload main Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-playwright-evidence-${{ github.run_number }}
          path: |
            target/allure-results
            target/screenshots
            target/videos
            target/traces
            target/logs
            target/surefire-reports
          if-no-files-found: warn
          retention-days: 30

      - name: Clean result directories for known defects
        if: always()
        shell: bash
        run: |
          rm -rf \
            target/allure-results \
            target/site/allure-maven-plugin \
            target/surefire-reports \
            target/screenshots \
            target/videos \
            target/traces \
            target/logs

      - name: Run known defects suite
        if: always()
        id: known-defects
        shell: bash
        run: |
          set +e

          mvn -B -ntp test \
            -Dtest=KnownDefectsSuite \
            -DrunKnownDefects=true \
            -Demail="$LOGITRACK_EMAIL" \
            -Dpassword="$LOGITRACK_PASSWORD" \
            -Dheadless=true \
            -Dtimeout=60000 \
            -DopenAllure=false \
            -Dtest.retry.count=0 \
            -Djunit.jupiter.execution.parallel.enabled=false \
            -Djunit.jupiter.execution.parallel.mode.default=same_thread \
            -Djunit.jupiter.execution.parallel.mode.classes.default=same_thread

          exit_code=$?
          set -e

          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          echo "::notice::Known Defects Suite finalizada com codigo $exit_code. Falhas funcionais documentadas sao esperadas nesta suite."
          exit 0

      - name: Generate known defects Allure report
        if: always()
        run: mvn -B -ntp allure:report

      - name: Create known defects report fallback
        if: always()
        shell: bash
        run: |
          REPORT_DIR="target/site/allure-maven-plugin"

          if [ ! -f "$REPORT_DIR/index.html" ]; then
            mkdir -p "$REPORT_DIR"

            cat > "$REPORT_DIR/index.html" <<'HTML'
          <!doctype html>
          <html lang="pt-BR">
          <head>
            <meta charset="utf-8">
            <title>LogiTrack Pro - Defeitos conhecidos indisponiveis</title>
          </head>
          <body>
            <h1>Relatorio de defeitos conhecidos indisponivel</h1>
            <p>Consulte a execucao do GitHub Actions e os artefatos do workflow.</p>
          </body>
          </html>
          HTML
          fi

      - name: Add known defects report to public site
        if: always()
        shell: bash
        run: |
          mkdir -p public-site/known-defects

          cp -R target/site/allure-maven-plugin/. public-site/known-defects/
          touch public-site/known-defects/.nojekyll

          cat > public-site/reports.html <<'HTML'
          <!doctype html>
          <html lang="pt-BR">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>LogiTrack Pro - Relatorios de Qualidade</title>
          </head>
          <body>
            <h1>LogiTrack Pro - Relatorios de Qualidade</h1>
            <p><a href="./">Abrir regressao principal</a></p>
            <p><a href="./known-defects/">Abrir defeitos conhecidos</a></p>
          </body>
          </html>
          HTML

      - name: Upload known defects Allure HTML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: known-defects-allure-html-${{ github.run_number }}
          path: target/site/allure-maven-plugin
          if-no-files-found: error
          retention-days: 30

      - name: Upload known defects evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: known-defects-evidence-${{ github.run_number }}
          path: |
            target/allure-results
            target/screenshots
            target/videos
            target/traces
            target/logs
            target/surefire-reports
          if-no-files-found: warn
          retention-days: 30

      - name: Configure GitHub Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: public-site

  deploy-allure:
    name: Publish Allure reports on GitHub Pages
    if: always() && needs.quality-reports.result != 'cancelled'
    needs:
      - quality-reports
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Allure reports
        id: deployment
        uses: actions/deploy-pages@v4
