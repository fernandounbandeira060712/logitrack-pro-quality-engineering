name: Main Regression and Allure Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: main-regression-allure-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  full-regression:
    name: Full Regression Suite
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      LOGITRACK_EMAIL: ${{ secrets.LOGITRACK_EMAIL }}
      LOGITRACK_PASSWORD: ${{ secrets.LOGITRACK_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Validate required secrets
        shell: bash
        run: |
          if [ -z "$LOGITRACK_EMAIL" ] || [ -z "$LOGITRACK_PASSWORD" ]; then
            echo "::error::Configure LOGITRACK_EMAIL and LOGITRACK_PASSWORD in repository secrets."
            exit 1
          fi

      - name: Install Playwright Chromium
        run: >
          mvn -B -ntp exec:java
          -Dexec.mainClass=com.microsoft.playwright.CLI
          -Dexec.args="install --with-deps chromium"

      - name: Run full regression suite
        run: >
          mvn -B -ntp clean test
          -Dtest=FullRegressionSuite
          -Demail="$LOGITRACK_EMAIL"
          -Dpassword="$LOGITRACK_PASSWORD"
          -Dheadless=true
          -Dtimeout=45000
          -DopenAllure=false
          -Dtest.retry.count=1

      - name: Generate Allure report
        if: always()
        run: mvn -B -ntp allure:report

      - name: Show generated Allure files
        if: always()
        shell: bash
        run: |
          echo "Conteudo gerado em target/site:"
          find target/site -maxdepth 4 -type f -print 2>/dev/null | sort | head -200 || true

      - name: Create fallback page when report generation fails
        if: always()
        shell: bash
        run: |
          REPORT_DIR="target/site/allure-maven-plugin"

          if [ ! -f "$REPORT_DIR/index.html" ]; then
            mkdir -p "$REPORT_DIR"

            cat > "$REPORT_DIR/index.html" <<'HTML'
          <!doctype html>
          <html lang="pt-BR">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>LogiTrack Pro - Allure indisponivel</title>
          </head>
          <body>
            <h1>Relatorio Allure indisponivel</h1>
            <p>Consulte a execucao do GitHub Actions e os artefatos do workflow.</p>
          </body>
          </html>
          HTML
          fi

          touch "$REPORT_DIR/.nojekyll"

      - name: Upload Allure HTML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-allure-html-${{ github.run_number }}
          path: target/site/allure-maven-plugin
          if-no-files-found: error
          retention-days: 30

      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-playwright-evidence-${{ github.run_number }}
          path: |
            target/allure-results
            target/screenshots
            target/videos
            target/traces
            target/logs
            target/surefire-reports
          if-no-files-found: warn
          retention-days: 30

      - name: Configure GitHub Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site/allure-maven-plugin

  deploy-allure:
    name: Publish Allure on GitHub Pages
    if: always() && needs.full-regression.result != 'cancelled'
    needs:
      - full-regression
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Allure report
        id: deployment
        uses: actions/deploy-pages@v4
